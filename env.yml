name: ect
channels:
  - pytorch
  - nvidia
  - defaults
dependencies:
  - python==3.9.18
  - pip==24.0
  - pytorch=2.3.0
  - pytorch-cuda=12.1
  # PyTorch 2.3.0 is incompatible with MKL 2024.1+ (`iJIT_NotifyEvent`).
  - mkl=2023.1.0
  - pip:
    - click==8.1.7
    - requests==2.31.0
    - pillow==10.2.0
    - numpy==1.26.4
    - scipy==1.12.0
    - psutil==5.9.8
    - tqdm==4.66.2
    - imageio==2.34.0
    - imageio-ffmpeg==0.4.9
    - pyspng==0.1.1
    - diffusers==0.26.3
    - accelerate==0.27.2
    - huggingface-hub==0.20.3
